<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshGateway Setup</title>
    <style>
        :root {
            --bg: #f3f6ff;
            --card: #ffffff;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #dbe2f0;
        }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            max-width: 520px;
            margin: 0 auto;
            padding: 18px;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
        }
        .container {
            background: var(--card);
            padding: 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(28, 61, 135, 0.10);
        }
        h1 {
            color: var(--text);
            text-align: center;
            margin-bottom: 6px;
            font-size: 22px;
        }
        .subtitle {
            color: var(--muted);
            text-align: center;
            margin: 0 0 16px 0;
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text);
            font-weight: 600;
            font-size: 13px;
        }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #9ec1ff;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        button {
            background-color: var(--primary);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: .15s ease;
        }
        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .wifi-list {
            margin-top: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 180px;
            overflow-y: auto;
            background: #fff;
        }
        .wifi-item {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .wifi-item:last-child {
            border-bottom: none;
        }
        .wifi-item:hover {
            background: #eff6ff;
        }
        .wifi-rssi {
            color: #666;
            font-size: 12px;
        }
        .section-title {
            font-size: 15px;
            margin: 20px 0 10px;
            color: var(--text);
            border-left: 4px solid #9ec1ff;
            padding-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MeshGateway Setup</h1>
        <p class="subtitle">Cùng mạng WiFi: mở http://meshgateway.local. Khi kết nối AP cấu hình: dùng 192.168.4.1.</p>
        <div id="status"></div>
        
        <form id="wifiForm">
            <h2 class="section-title">WiFi</h2>
            <div class="form-group">
                <label for="ssid">Tên WiFi:</label>
                <input type="text" id="ssid" name="ssid">
            </div>
            <div class="form-group">
                <button type="button" id="scanBtn">Quét WiFi</button>
                <div id="wifiList" class="wifi-list" style="display:none;"></div>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password">
            </div>
            
            <h2 class="section-title">WebSocket</h2>
            <div class="form-group">
                <label for="ws_url">URL WebSocket (gồm cổng, ví dụ Node <code>:8080</code>):</label>
                <input type="text" id="ws_ip" name="ws_ip" placeholder="192.168.1.6" pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$"
                    title="Thiếu :port → client dùng cổng 80; server Node mặc định 8080">
                <p class="subtitle" style="margin-top:6px;font-size:0.9em;color:#666;">Lưu trong RAM và WebSocket sẽ tự kết nối lại bằng URL mới. Sau reset dùng mặc định menuconfig nếu trống.</p>
            </div>
            
            <h2 class="section-title">HTTP</h2>
            <div class="form-group">
                <label for="http_ip">Địa chỉ IP HTTP:</label>
                <input type="text" id="http_ip" name="http_ip" placeholder="192.168.1.6" pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$">
            </div>
            <div class="form-group">
                <label for="http_port">Port HTTP:</label>
                <input type="number" id="http_port" name="http_port" placeholder="3000" min="1" max="65535">
            </div>
            
            <button type="submit">Kết nối / Lưu cấu hình</button>
        </form>
    </div>

    <script>
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function extractWsIp(wsUrl) {
            if (!wsUrl) {
                return '';
            }
            const match = String(wsUrl).match(/^wss?:\/\/([^/:]+)(?::\d+)?(?:\/.*)?$/i);
            return match ? match[1] : wsUrl;
        }

        function setupWebSocketIpField() {
            const label = document.querySelector('label[for="ws_url"]');
            const input = document.getElementById('ws_ip');
            if (label) {
                label.setAttribute('for', 'ws_ip');
                label.textContent = 'IP WebSocket server:';
            }
            if (input) {
                input.title = 'Chi nhap IP. Thiet bi se tu ghep thanh ws://IP:8080/ws';
                const help = input.parentElement ? input.parentElement.querySelector('p') : null;
                if (help) {
                    help.textContent = 'Chi nhap IP, he thong tu dung ws://IP:8080/ws.';
                }
            }
        }

        function renderWifiList(networks) {
            const list = document.getElementById('wifiList');
            list.innerHTML = '';
            if (!Array.isArray(networks) || networks.length === 0) {
                list.style.display = 'block';
                list.innerHTML = '<div class="wifi-item"><span>Không tìm thấy WiFi</span></div>';
                return;
            }
            networks.sort((a, b) => (b.rssi || -999) - (a.rssi || -999));
            networks.forEach(net => {
                const item = document.createElement('div');
                item.className = 'wifi-item';
                item.innerHTML = `<span>${net.ssid}</span><span class="wifi-rssi">${net.rssi} dBm</span>`;
                item.addEventListener('click', () => {
                    document.getElementById('ssid').value = net.ssid || '';
                    document.getElementById('password').focus();
                    showStatus(`Đã chọn WiFi: ${net.ssid}`, 'success');
                });
                list.appendChild(item);
            });
            list.style.display = 'block';
        }

        document.getElementById('scanBtn').addEventListener('click', function() {
            showStatus('Đang quét WiFi...', 'success');
            fetch('/scan')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderWifiList(data.networks || []);
                        showStatus('Quét WiFi thành công. Chọn mạng để kết nối.', 'success');
                    } else {
                        showStatus('Không quét được WiFi: ' + (data.message || 'unknown error'), 'error');
                    }
                })
                .catch(error => {
                    showStatus('Lỗi quét WiFi: ' + error, 'error');
                });
        });

        // Load current configuration on page load
        window.addEventListener('load', function() {
            setupWebSocketIpField();
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    const currentSsid = data.sta_ssid || data.configured_ssid || '';
                    if (currentSsid) {
                        document.getElementById('ssid').value = currentSsid;
                    }
                    if (data.ws_url) {
                        document.getElementById('ws_ip').value = extractWsIp(data.ws_url);
                    }
                    if (data.http_ip) {
                        const httpIpInput = document.getElementById('http_ip');
                        httpIpInput.value = data.http_ip;
                        httpIpInput.dataset.loaded = data.http_ip;
                    }
                    if (data.http_port) {
                        const httpPortInput = document.getElementById('http_port');
                        httpPortInput.value = data.http_port;
                        httpPortInput.dataset.loaded = String(data.http_port);
                    }
                })
                .catch(error => {
                    console.log('Could not load current config:', error);
                });
        });

        document.getElementById('wifiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {};
            
            // Only include fields that have values
            const ssid = formData.get('ssid');
            const password = formData.get('password');
            const ws_ip = formData.get('ws_ip');
            const http_ip = formData.get('http_ip');
            const http_port = formData.get('http_port');
            
            if (ssid && ssid.trim() !== '' && password && password.trim() !== '') {
                data.ssid = ssid;
                data.password = password;
            }
            if (ws_ip && ws_ip.trim() !== '') {
                data.ws_url = `ws://${ws_ip.trim()}:8080/ws`;
            }
            const httpIpInput = document.getElementById('http_ip');
            const httpPortInput = document.getElementById('http_port');
            if (http_ip && http_ip.trim() !== '' &&
                http_ip.trim() !== '0.0.0.0' &&
                http_ip.trim() !== (httpIpInput.dataset.loaded || '')) {
                data.http_ip = http_ip.trim();
            }
            if (http_port && http_port.trim() !== '' &&
                http_port.trim() !== (httpPortInput.dataset.loaded || '')) {
                data.http_port = parseInt(http_port);
            }
            
            // Check if at least one field is filled
            if (Object.keys(data).length === 0) {
                showStatus('Vui lòng điền ít nhất một trường', 'error');
                return;
            }
            
            showStatus('Đang lưu cấu hình...', 'success');
            
            fetch('/configure', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showStatus(data.message || 'Đã gửi lệnh kết nối/cấu hình thành công!', 'success');
                } else {
                    showStatus('Lỗi: ' + data.message, 'error');
                }
            })
            .catch(error => {
                showStatus('Lỗi: ' + error, 'error');
            });
        });
    </script>
</body>
</html>
