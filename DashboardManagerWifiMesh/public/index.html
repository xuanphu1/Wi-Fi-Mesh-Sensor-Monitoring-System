<!-- Khai báo tài liệu chuẩn HTML5 -->
<!DOCTYPE html>
<!-- Thẻ gốc của trang HTML -->
<html lang="en">
  <!-- Head chứa metadata, title, và css/font tải trước -->
  <head>
    <!-- Khai báo bảng mã UTF-8 -->
    <meta charset="utf-8" />
    <!-- Icon tab trình duyệt -->
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.png" />
    <!-- Cho responsive đúng trên mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Manifest cho thông tin PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Tiêu đề hiển thị trên tab -->
    <title>MSMS Dashboard</title>
    <!-- Font Roboto cho UI -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
    />
    <!-- CSS của Leaflet nếu dùng map -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
      integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
      crossorigin=""
    />
    <!-- Bộ Material Icons -->
    <link
      href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Two+Tone|Material+Icons+Round|Material+Icons+Sharp"
      rel="stylesheet"
    />
  </head>

  <!-- Body là nơi chứa node mount của React -->
  <body>
    <!-- Thông báo fallback nếu người dùng tắt JavaScript -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Node gốc để React mount toàn bộ ứng dụng (xem src/index.js) -->
    <div id="root"></div>
  </body>
</html>
